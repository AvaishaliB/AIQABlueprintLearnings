# ============================================================
# GitHub Actions - Real CI Workflow
# Project: AIQABluePrint2XClasses_2k26MYLearnings
# Workflow: testing.yml
# ============================================================
# What this workflow ACTUALLY does:
#   1. Sets up Python 3.11 on a fresh Ubuntu runner
#   2. Installs all Python dependencies (playwright, python-docx)
#   3. Installs Playwright Chromium browser
#   4. Runs the real automated_sanity_check.py against SauceDemo
#   5. Uploads the screenshot + Word report as downloadable artifacts
#   6. Reports pass/fail status in the Actions tab
# ============================================================

name: 🤖 AI-QA Blueprint - Sanity Check CI

on:
  # Run automatically on every push to main
  push:
    branches:
      - main

  # Run automatically on Pull Requests targeting main
  pull_request:
    branches:
      - main

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:

  # ──────────────────────────────────────────────────────────
  # JOB: Run the Playwright Sanity Check
  # ──────────────────────────────────────────────────────────
  playwright-sanity-check:
    name: 🎭 Playwright Sanity Check - SauceDemo Login
    runs-on: ubuntu-latest

    steps:

      # ── Step 1: Checkout the repository ──
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      # ── Step 2: Set up Python 3.11 ──
      - name: 🐍 Set Up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── Step 3: Install Python dependencies ──
      - name: 📦 Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          pip install python-docx

      # ── Step 4: Install Playwright Chromium browser ──
      - name: 🌐 Install Playwright Chromium Browser
        run: python -m playwright install chromium --with-deps

      # ── Step 5: Run the real sanity check script ──
      - name: 🧪 Run Automated Sanity Check (SauceDemo Login)
        run: python automated_sanity_check.py
        # This script:
        #   • Opens chromium headlessly
        #   • Navigates to https://www.saucedemo.com/
        #   • Logs in with standard_user / secret_sauce
        #   • Takes a screenshot
        #   • Generates Sanity_Result.docx

      # ── Step 6: Upload screenshot as artifact ──
      - name: 📸 Upload Screenshot Artifact
        if: always()   # Upload even if the test fails (for debugging)
        uses: actions/upload-artifact@v4
        with:
          name: sanity-check-screenshot
          path: saucedemo_login_screenshot.png
          retention-days: 7

      # ── Step 7: Upload Word report as artifact ──
      - name: 📄 Upload Sanity Report (Word Doc) Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sanity-check-report
          path: Sanity_Result.docx
          retention-days: 7

      # ── Step 8: Print job summary ──
      - name: 📋 Write Job Summary
        if: always()
        run: |
          echo "## 🤖 Sanity Check Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🌐 Target App | SauceDemo (https://www.saucedemo.com/) |" >> $GITHUB_STEP_SUMMARY
          echo "| 👤 Test User | standard_user |" >> $GITHUB_STEP_SUMMARY
          echo "| 🌿 Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔀 Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 👩‍💻 Triggered By | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📅 Run Date | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📎 Download the screenshot and Word report from the **Artifacts** section below." >> $GITHUB_STEP_SUMMARY

  # ──────────────────────────────────────────────────────────
  # JOB: Validate n8n JSON Workflow Files
  # ──────────────────────────────────────────────────────────
  validate-n8n-workflows:
    name: 🔍 Validate n8n JSON Workflow Files
    runs-on: ubuntu-latest

    steps:

      # ── Step 1: Checkout the repository ──
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      # ── Step 2: Validate all JSON files in Project_04 are valid JSON ──
      - name: ✅ Validate n8n JSON Files
        run: |
          echo "Validating all n8n workflow JSON files..."
          FAILED=0
          for file in "Project_04_AI_Agent_Using _n8n"/*.json; do
            echo -n "  Checking: $file ... "
            if python3 -m json.tool "$file" > /dev/null 2>&1; then
              echo "✅ VALID"
            else
              echo "❌ INVALID JSON"
              FAILED=1
            fi
          done
          if [ "$FAILED" -eq 1 ]; then
            echo ""
            echo "❌ One or more JSON files failed validation!"
            exit 1
          else
            echo ""
            echo "✅ All n8n JSON workflow files are valid!"
          fi

      # ── Step 3: List validated files ──
      - name: 📋 List Validated n8n Workflow Files
        run: |
          echo "n8n workflow files found in Project_04:"
          ls -lh "Project_04_AI_Agent_Using _n8n"/*.json
